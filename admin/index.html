<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>냠냠어스 관리자</title>
<!--
  냠냠어스 운영자 관리자 페이지 (정적 단일 파일, 운영(prod) 전용).
  - 공지사항 발행/수정/삭제, 사용자 문의(feedback) 조회·상태 갱신.
  - 인증: 관리자 전용 비밀번호(앱 유저 auth.users 와 완전 분리). 비번은 서버의
    admin_secret 테이블에 bcrypt 해시로 보관되고, 비번으로 잠긴 RPC(admin_*)로만 처리된다.
  - 보안: 이 파일엔 공개(anon) 키만 있다(안전). 비번 없이는 RPC 가 전부 거부된다.
    ⚠️ service_role(비밀) 키는 절대 여기에 넣지 말 것.
  - 접속: https://mkik137.github.io/Terms-of-Service/admin/
-->
<style>
  :root {
    --bg: #faf7f5; --card: #ffffff; --line: #ecdfd9; --text: #2a1712;
    --muted: #7a655d; --primary: #d6422a; --primary-ink: #fff; --ok: #2e9e57; --warn: #b5842a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
  }
  header {
    display: flex; align-items: center; gap: 10px; padding: 14px 20px;
    background: var(--card); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 800; }
  .spacer { flex: 1; }
  .who { font-size: 12.5px; color: var(--muted); }
  main { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; margin-bottom: 16px;
  }
  h2 { font-size: 15px; margin: 0 0 12px; }
  label { display: block; font-size: 12.5px; font-weight: 700; color: var(--muted); margin: 10px 0 4px; }
  input[type=text], input[type=password], textarea, input[type=url] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
    font: inherit; background: #fff; color: var(--text);
  }
  textarea { min-height: 92px; resize: vertical; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 160px; }
  .check { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-weight: 700; }
  .check input { width: 18px; height: 18px; }
  button {
    font: inherit; font-weight: 700; border: none; border-radius: 10px; padding: 10px 16px;
    cursor: pointer; background: var(--primary); color: var(--primary-ink);
  }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  button.sm { padding: 6px 10px; font-size: 12.5px; border-radius: 8px; }
  button:disabled { opacity: .5; cursor: default; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tabs button { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .tabs button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .list-item {
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex: 0 0 auto; }
  .dot.on { background: var(--ok); } .dot.off { background: #cbb8b1; }
  .grow { flex: 1; min-width: 0; }
  .title { font-weight: 800; font-size: 14.5px; word-break: break-word; }
  .meta { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .msg { font-size: 13.5px; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
  .badge { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 999px; background: #f1e7e3; color: #6a4a41; }
  .badge.bug { background:#ffdbd1; color:#8a2a14; } .badge.idea { background:#e2f0d9; color:#2e6a3c; }
  .badge.question { background:#e0ecff; color:#284f8a; }
  .badge.open { background:#fff0d6; color:#7a4f00; } .badge.done { background:#e2f0d9; color:#2e6a3c; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .err { color: var(--primary); font-size: 13px; margin-top: 8px; min-height: 18px; }
  .center { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login { width: 100%; max-width: 360px; }
  .hidden { display: none !important; }
  .empty { color: var(--muted); font-size: 13.5px; padding: 8px 2px; }
  .chips { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .chip {
    background: transparent; color: var(--muted); border: 1px solid var(--line);
    padding: 6px 12px; font-size: 12.5px; font-weight: 700; border-radius: 999px; cursor: pointer;
  }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .badge.rep { background: #ffdbd1; color: #8a2a14; }
  .badge.dismissed { background: #eceae9; color: #6b6360; }
  .badge.collection { background: #e0ecff; color: #284f8a; }
  .badge.comment { background: #efe3ff; color: #5a3a8a; }
  .badge.profile { background: #e2f0d9; color: #2e6a3c; }
  .items { margin-top: 6px; padding-left: 4px; }
</style>
</head>
<body>

<!-- 로그인 (관리자 전용 비밀번호) -->
<div id="loginView" class="center">
  <div class="card login">
    <h2>냠냠어스 관리자</h2>
    <p class="hint">운영자 전용 비밀번호를 입력하세요. (앱 로그인과 무관)</p>
    <label>비밀번호</label>
    <input type="password" id="password" autocomplete="current-password" />
    <div style="margin-top:14px"><button id="loginBtn" style="width:100%">로그인</button></div>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- 관리자 패널 -->
<div id="appView" class="hidden">
  <header>
    <h1>냠냠어스 관리자</h1>
    <div class="spacer"></div>
    <span class="who">운영자</span>
    <button class="ghost sm" id="logoutBtn">로그아웃</button>
  </header>
  <main>
    <div class="tabs">
      <button id="tabAnnBtn" class="active" onclick="showTab('ann')">공지사항</button>
      <button id="tabColBtn" onclick="showTab('col')">컬렉션 <span id="colCount"></span></button>
      <button id="tabRepBtn" onclick="showTab('rep')">신고 <span id="repCount"></span></button>
      <button id="tabFbBtn" onclick="showTab('fb')">문의 <span id="fbCount"></span></button>
    </div>

    <!-- 공지 탭 -->
    <section id="tabAnn">
      <div class="card">
        <h2 id="annFormTitle">새 공지 작성</h2>
        <div class="row">
          <div>
            <label>ID (영문/숫자, 예: notice-2026-07-16)</label>
            <input type="text" id="a_id" placeholder="notice-2026-07-16" />
          </div>
        </div>
        <label>제목 *</label>
        <input type="text" id="a_title" />
        <label>본문 (줄바꿈 가능)</label>
        <textarea id="a_body"></textarea>
        <div class="row">
          <div>
            <label>이미지 (선택, jpg/png/webp/gif · 5MB 이하)</label>
            <input type="file" id="a_imageFile" accept="image/*" />
            <input type="hidden" id="a_image" />
            <div id="a_imageStatus" class="hint"></div>
            <div id="a_imagePreview" class="hidden" style="margin-top:8px">
              <img id="a_imagePreviewImg" alt="미리보기"
                   style="max-width:220px;max-height:150px;border-radius:8px;border:1px solid var(--line);display:block" />
              <button type="button" class="ghost sm" id="a_imageRemove" style="margin-top:6px">이미지 제거</button>
            </div>
          </div>
        </div>
        <div class="row">
          <div>
            <label>버튼 링크 URL (선택)</label>
            <input type="url" id="a_link" placeholder="https://..." />
          </div>
          <div>
            <label>버튼 문구 (선택, 기본 '자세히 보기')</label>
            <input type="text" id="a_linklabel" placeholder="자세히 보기" />
          </div>
        </div>
        <div class="check"><input type="checkbox" id="a_active" /><span>지금 노출(active)</span></div>
        <p class="hint">같은 내용을 이미 '다시 보지 않기' 한 사용자에게도 다시 띄우려면 <b>새 ID</b>로 저장하세요.</p>
        <div style="margin-top:14px" class="actions">
          <button id="a_save">저장 / 발행</button>
          <button class="ghost" id="a_clear">새로 작성</button>
        </div>
        <div class="err" id="annErr"></div>
      </div>
      <div class="card">
        <h2>공지 목록</h2>
        <div id="annList"><div class="empty">불러오는 중…</div></div>
      </div>
    </section>

    <!-- 컬렉션 탭 (커뮤니티 컬렉션 전체 관리 + 신고됨 필터) -->
    <section id="tabCol" class="hidden">
      <div class="card">
        <h2>컬렉션 관리</h2>
        <p class="hint">공개된 커뮤니티 컬렉션을 관리해요. 부적절하면 삭제하거나 비공개로 내릴 수 있어요.</p>
        <div class="chips" id="colFilter">
          <button class="chip active" data-f="all">전체</button>
          <button class="chip" data-f="public">공개</button>
          <button class="chip" data-f="reported">신고됨 <span id="colRepCount"></span></button>
        </div>
        <div id="colList"><div class="empty">불러오는 중…</div></div>
      </div>
    </section>

    <!-- 신고 탭 (컬렉션/댓글/프로필 신고 처리) -->
    <section id="tabRep" class="hidden">
      <div class="card">
        <h2>신고 처리</h2>
        <p class="hint">사용자가 접수한 신고예요. 확인 후 해결/기각하거나 대상을 삭제하세요.</p>
        <div class="chips" id="repFilter">
          <button class="chip active" data-f="open">미처리</button>
          <button class="chip" data-f="all">전체</button>
        </div>
        <div id="repList"><div class="empty">불러오는 중…</div></div>
      </div>
    </section>

    <!-- 문의 탭 -->
    <section id="tabFb" class="hidden">
      <div class="card">
        <h2>사용자 문의</h2>
        <div id="fbList"><div class="empty">불러오는 중…</div></div>
      </div>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  "use strict";

  // ── 운영(prod) 접속 정보 (공개 anon 키 — 노출돼도 안전) ────────────
  var SUPABASE_URL = "https://temfeihnshpesjggawmx.supabase.co";
  var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbWZlaWhuc2hwZXNqZ2dhd214Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzQ4NDEsImV4cCI6MjA5NzgxMDg0MX0.eygzMK0lQe1ounz6_7ugR0w4LPYL98FwZhLYHneDsQ0";
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  var PW_KEY = "nyam_admin_pw";
  var PW = sessionStorage.getItem(PW_KEY) || null; // 로그인 후 이 탭 세션 동안 보관

  var $ = function (id) { return document.getElementById(id); };
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function fmtDate(s) {
    if (!s) return "";
    var d = new Date(s);
    if (isNaN(d)) return s;
    var p = function (n) { return (n < 10 ? "0" : "") + n; };
    return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) +
      " " + p(d.getHours()) + ":" + p(d.getMinutes());
  }
  // 비번으로 잠긴 RPC 호출. 비번 오류면 로그아웃으로 유도.
  async function rpc(fn, params) {
    var res = await sb.rpc(fn, Object.assign({ p_pw: PW }, params || {}));
    if (res.error && /unauthorized/i.test(res.error.message || "")) {
      logout();
      throw new Error("세션이 만료됐어요. 다시 로그인해 주세요.");
    }
    return res;
  }

  function show(view) {
    $("loginView").classList.toggle("hidden", view !== "login");
    $("appView").classList.toggle("hidden", view !== "app");
  }

  function logout() {
    PW = null; sessionStorage.removeItem(PW_KEY); show("login");
  }
  $("logoutBtn").onclick = logout;

  function enter() {
    show("app");
    bindChips("colFilter", function (f) { colFilter = f; renderCollections(); });
    bindChips("repFilter", function (f) { repFilter = f; renderReports(); });
    loadAnnouncements();
    loadCollections();
    loadReports();
    loadFeedback();
  }

  $("loginBtn").onclick = async function () {
    $("loginErr").textContent = "";
    $("loginBtn").disabled = true;
    var pw = $("password").value;
    var res = await sb.rpc("admin_check", { p_pw: pw });
    $("loginBtn").disabled = false;
    if (res.error) { $("loginErr").textContent = "오류: " + res.error.message; return; }
    if (res.data !== true) { $("loginErr").textContent = "비밀번호가 틀렸어요."; return; }
    PW = pw; sessionStorage.setItem(PW_KEY, pw);
    $("password").value = "";
    enter();
  };
  $("password").addEventListener("keydown", function (e) { if (e.key === "Enter") $("loginBtn").click(); });

  // ── 탭 ────────────────────────────────────────────────────────
  window.showTab = function (t) {
    ["ann", "col", "rep", "fb"].forEach(function (x) {
      var C = x.charAt(0).toUpperCase() + x.slice(1);
      $("tab" + C).classList.toggle("hidden", x !== t);
      $("tab" + C + "Btn").classList.toggle("active", x === t);
    });
  };

  // 필터 칩(공용): 클릭 시 active 이동 + 콜백.
  function bindChips(containerId, onPick) {
    var box = $(containerId);
    box.querySelectorAll(".chip").forEach(function (btn) {
      btn.onclick = function () {
        box.querySelectorAll(".chip").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        onPick(btn.getAttribute("data-f"));
      };
    });
  }
  function visLabel(v) { return v === "public" ? "공개" : v === "friends" ? "친구공개" : "비공개"; }

  // ── 공지사항 ──────────────────────────────────────────────────
  // 공지 이미지 상태(hidden a_image = URL) + 미리보기 토글.
  function setAnnImage(urlVal) {
    $("a_image").value = urlVal || "";
    var has = !!urlVal;
    $("a_imagePreview").classList.toggle("hidden", !has);
    if (has) $("a_imagePreviewImg").src = urlVal;
  }

  function clearAnnForm() {
    ["a_id", "a_title", "a_body", "a_link", "a_linklabel"].forEach(function (id) { $(id).value = ""; });
    setAnnImage("");
    $("a_imageFile").value = ""; $("a_imageStatus").textContent = "";
    $("a_active").checked = false;
    $("a_id").disabled = false;
    $("annFormTitle").textContent = "새 공지 작성";
    $("annErr").textContent = "";
  }
  $("a_clear").onclick = clearAnnForm;

  function loadIntoForm(a) {
    $("a_id").value = a.id; $("a_id").disabled = true;
    $("a_title").value = a.title || "";
    $("a_body").value = a.body || "";
    setAnnImage(a.image_url || "");
    $("a_imageFile").value = ""; $("a_imageStatus").textContent = "";
    $("a_link").value = a.link_url || "";
    $("a_linklabel").value = a.link_label || "";
    $("a_active").checked = !!a.active;
    $("annFormTitle").textContent = "공지 수정: " + a.id;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // 파일 선택 → admin-upload Edge Function 으로 업로드 → 공개 URL 을 a_image 에 반영.
  $("a_imageFile").addEventListener("change", async function () {
    var file = this.files && this.files[0];
    if (!file) return;
    var status = $("a_imageStatus");
    if (!/^image\//.test(file.type)) { status.textContent = "이미지 파일만 올릴 수 있어요."; this.value = ""; return; }
    if (file.size > 5 * 1024 * 1024) { status.textContent = "파일은 5MB 이하만 가능해요."; this.value = ""; return; }
    status.textContent = "업로드 중…";
    try {
      var dataUrl = await new Promise(function (resolve, reject) {
        var fr = new FileReader();
        fr.onload = function () { resolve(fr.result); };
        fr.onerror = function () { reject(new Error("파일 읽기 실패")); };
        fr.readAsDataURL(file);
      });
      var res = await sb.functions.invoke("admin-upload", {
        body: { pw: PW, contentType: file.type, dataBase64: dataUrl }
      });
      if (res.error) {
        var msg = "업로드 실패";
        try { var b = await res.error.context.json(); msg = b.error || msg; }
        catch (_) { msg = res.error.message || msg; }
        status.textContent = msg; return;
      }
      var url = res.data && res.data.url;
      if (!url) { status.textContent = "업로드 실패: URL 없음"; return; }
      setAnnImage(url);
      status.textContent = "업로드 완료 ✓";
    } catch (e) { status.textContent = "업로드 실패: " + e.message; }
    finally { this.value = ""; }
  });

  $("a_imageRemove").onclick = function () { setAnnImage(""); $("a_imageStatus").textContent = ""; };

  function annParams(a) {
    return {
      p_id: a.id, p_title: a.title, p_body: a.body || "",
      p_image_url: a.image_url || null, p_link_url: a.link_url || null,
      p_link_label: a.link_label || null, p_active: !!a.active
    };
  }

  $("a_save").onclick = async function () {
    $("annErr").textContent = "";
    var id = $("a_id").value.trim(), title = $("a_title").value.trim();
    if (!id || !title) { $("annErr").textContent = "ID 와 제목은 필수예요."; return; }
    var a = {
      id: id, title: title, body: $("a_body").value,
      image_url: $("a_image").value.trim() || null,
      link_url: $("a_link").value.trim() || null,
      link_label: $("a_linklabel").value.trim() || null,
      active: $("a_active").checked
    };
    $("a_save").disabled = true;
    try {
      var res = await rpc("admin_upsert_announcement", annParams(a));
      $("a_save").disabled = false;
      if (res.error) { $("annErr").textContent = "저장 실패: " + res.error.message; return; }
      clearAnnForm(); loadAnnouncements();
    } catch (e) { $("a_save").disabled = false; $("annErr").textContent = e.message; }
  };

  async function loadAnnouncements() {
    var box = $("annList");
    try {
      var res = await rpc("admin_announcements");
      if (res.error) { box.innerHTML = '<div class="empty">불러오기 실패: ' + esc(res.error.message) + "</div>"; return; }
      var rows = res.data || [];
      if (!rows.length) { box.innerHTML = '<div class="empty">등록된 공지가 없어요.</div>'; return; }
      box.innerHTML = "";
      rows.forEach(function (a) {
        var el = document.createElement("div");
        el.className = "list-item";
        el.innerHTML =
          '<div class="dot ' + (a.active ? "on" : "off") + '"></div>' +
          '<div class="grow">' +
            '<div class="title">' + esc(a.title) + "</div>" +
            '<div class="meta">' + esc(a.id) + " · " + (a.active ? "노출중" : "비활성") +
               " · " + fmtDate(a.created_at) + "</div>" +
            (a.body ? '<div class="msg">' + esc(a.body) + "</div>" : "") +
          "</div><div class=\"actions\"></div>";
        var acts = el.querySelector(".actions");
        acts.appendChild(mkBtn("수정", "ghost sm", function () { loadIntoForm(a); }));
        var tgl = mkBtn(a.active ? "내리기" : "발행", "sm", async function () {
          tgl.disabled = true;
          var r = await rpc("admin_upsert_announcement", annParams(Object.assign({}, a, { active: !a.active })));
          if (r.error) { alert("실패: " + r.error.message); tgl.disabled = false; return; }
          loadAnnouncements();
        });
        acts.appendChild(tgl);
        acts.appendChild(mkBtn("삭제", "ghost sm", async function () {
          if (!confirm("'" + a.id + "' 공지를 삭제할까요?")) return;
          var r = await rpc("admin_delete_announcement", { p_id: a.id });
          if (r.error) { alert("실패: " + r.error.message); return; }
          loadAnnouncements();
        }));
        box.appendChild(el);
      });
    } catch (e) { box.innerHTML = '<div class="empty">' + esc(e.message) + "</div>"; }
  }

  function mkBtn(text, cls, onclick) {
    var b = document.createElement("button");
    b.className = cls; b.textContent = text; b.onclick = onclick;
    return b;
  }

  // ── 문의(feedback) ────────────────────────────────────────────
  async function loadFeedback() {
    var box = $("fbList");
    try {
      var res = await rpc("admin_feedback");
      if (res.error) { box.innerHTML = '<div class="empty">불러오기 실패: ' + esc(res.error.message) + "</div>"; return; }
      var rows = res.data || [];
      var open = rows.filter(function (r) { return r.status === "open"; }).length;
      $("fbCount").textContent = open ? "(" + open + ")" : "";
      if (!rows.length) { box.innerHTML = '<div class="empty">문의가 없어요.</div>'; return; }
      box.innerHTML = "";
      rows.forEach(function (f) {
        var cat = (f.category || "etc"), done = f.status === "done";
        var el = document.createElement("div");
        el.className = "list-item";
        el.innerHTML =
          '<div class="grow">' +
            '<div class="actions" style="margin-bottom:4px">' +
              '<span class="badge ' + esc(cat) + '">' + esc(cat) + "</span>" +
              '<span class="badge ' + (done ? "done" : "open") + '">' + (done ? "처리완료" : "미처리") + "</span>" +
            "</div>" +
            '<div class="msg">' + esc(f.message) + "</div>" +
            '<div class="meta">' +
              (f.contact ? "연락처: " + esc(f.contact) + " · " : "") +
              esc(f.platform || "") + (f.app_version ? " v" + esc(f.app_version) : "") +
              " · " + fmtDate(f.created_at) +
            "</div>" +
          "</div><div class=\"actions\"></div>";
        var acts = el.querySelector(".actions:last-child");
        var btn = mkBtn(done ? "미처리로" : "처리완료", "sm" + (done ? " ghost" : ""), async function () {
          btn.disabled = true;
          var r = await rpc("admin_set_feedback_status", { p_id: f.id, p_status: done ? "open" : "done" });
          if (r.error) { alert("실패: " + r.error.message); btn.disabled = false; return; }
          loadFeedback();
        });
        acts.appendChild(btn);
        box.appendChild(el);
      });
    } catch (e) { box.innerHTML = '<div class="empty">' + esc(e.message) + "</div>"; }
  }

  // ── 컬렉션 관리 ───────────────────────────────────────────────
  var colData = [], colFilter = "all";

  async function loadCollections() {
    var box = $("colList");
    try {
      var res = await rpc("admin_collections");
      if (res.error) { box.innerHTML = '<div class="empty">불러오기 실패: ' + esc(res.error.message) + "</div>"; return; }
      colData = res.data || [];
      var reported = colData.filter(function (c) { return c.report_count > 0; }).length;
      $("colRepCount").textContent = reported ? "(" + reported + ")" : "";
      $("colCount").textContent = reported ? "(" + reported + ")" : "";
      renderCollections();
    } catch (e) { box.innerHTML = '<div class="empty">' + esc(e.message) + "</div>"; }
  }

  function renderCollections() {
    var box = $("colList");
    var rows = colData.filter(function (c) {
      if (colFilter === "reported") return c.report_count > 0;
      if (colFilter === "public") return c.is_public;
      return true;
    });
    if (!rows.length) { box.innerHTML = '<div class="empty">해당하는 컬렉션이 없어요.</div>'; return; }
    box.innerHTML = "";
    rows.forEach(function (c) {
      var el = document.createElement("div");
      el.className = "list-item";
      var reasons = (c.report_reasons || []).join(", ");
      el.innerHTML =
        '<div class="grow">' +
          '<div class="actions" style="margin-bottom:4px">' +
            (c.report_count > 0 ? '<span class="badge rep">🚩 신고 ' + c.report_count + "</span>" : "") +
            '<span class="badge ' + (c.is_public ? "done" : "open") + '">' + esc(visLabel(c.visibility)) + "</span>" +
          "</div>" +
          '<div class="title">' + esc(c.title || "(제목 없음)") + "</div>" +
          '<div class="meta">' + esc(c.owner_name || "?") + (c.owner_handle ? " @" + esc(c.owner_handle) : "") +
            " · 항목 " + c.item_count + " · ❤ " + c.like_count + " · 💾 " + c.save_count + " · 💬 " + c.comment_count +
            " · " + fmtDate(c.created_at) + "</div>" +
          (reasons ? '<div class="msg">신고 사유: ' + esc(reasons) + "</div>" : "") +
          '<div class="items hidden"></div>' +
        '</div><div class="actions"></div>';
      var acts = el.querySelector(".actions:last-child");
      var itemsBox = el.querySelector(".items");
      acts.appendChild(mkBtn("미리보기", "ghost sm", async function () {
        if (!itemsBox.classList.contains("hidden")) { itemsBox.classList.add("hidden"); return; }
        itemsBox.innerHTML = '<div class="meta">불러오는 중…</div>'; itemsBox.classList.remove("hidden");
        var r = await rpc("admin_collection_items", { p_collection_id: c.id });
        if (r.error) { itemsBox.innerHTML = '<div class="meta">실패: ' + esc(r.error.message) + "</div>"; return; }
        var its = r.data || [];
        itemsBox.innerHTML = its.length ? its.map(function (it) {
          return '<div class="meta">• ' + esc(it.name || "") + (it.category ? " (" + esc(it.category) + ")" : "") +
            (it.one_line ? " — " + esc(it.one_line) : "") + "</div>";
        }).join("") : '<div class="meta">(항목 없음)</div>';
      }));
      var hideBtn = mkBtn(c.is_public ? "비공개로" : "공개로", "ghost sm", async function () {
        hideBtn.disabled = true;
        var r = await rpc("admin_set_collection_visibility",
          { p_id: c.id, p_visibility: c.is_public ? "private" : "public" });
        if (r.error) { alert("실패: " + r.error.message); hideBtn.disabled = false; return; }
        loadCollections();
      });
      acts.appendChild(hideBtn);
      acts.appendChild(mkBtn("삭제", "sm", async function () {
        if (!confirm('컬렉션 "' + (c.title || "") + '"을(를) 삭제할까요? 되돌릴 수 없어요.')) return;
        var r = await rpc("admin_delete_collection", { p_id: c.id });
        if (r.error) { alert("실패: " + r.error.message); return; }
        loadCollections(); loadReports();
      }));
      box.appendChild(el);
    });
  }

  // ── 신고 처리 ─────────────────────────────────────────────────
  var repData = [], repFilter = "open";
  var TT = { collection: "컬렉션", comment: "댓글", profile: "프로필" };

  async function loadReports() {
    var box = $("repList");
    try {
      var res = await rpc("admin_reports");
      if (res.error) { box.innerHTML = '<div class="empty">불러오기 실패: ' + esc(res.error.message) + "</div>"; return; }
      repData = res.data || [];
      var open = repData.filter(function (r) { return r.status === "open"; }).length;
      $("repCount").textContent = open ? "(" + open + ")" : "";
      renderReports();
    } catch (e) { box.innerHTML = '<div class="empty">' + esc(e.message) + "</div>"; }
  }

  function targetSummary(r) {
    var t = r.target;
    if (!t) return '<span class="meta">(삭제된 대상)</span>';
    if (r.target_type === "collection")
      return "컬렉션 <b>" + esc(t.title || "") + "</b> · " + esc(t.owner_name || "?") + " · " + esc(visLabel(t.visibility));
    if (r.target_type === "comment")
      return '댓글 "' + esc(t.body || "") + '" · ' + esc(t.author_name || "?") +
        (t.collection_title ? " · 컬렉션 " + esc(t.collection_title) : "");
    if (r.target_type === "profile")
      return "프로필 <b>" + esc(t.name || "") + "</b>" + (t.handle ? " @" + esc(t.handle) : "");
    return "";
  }

  function renderReports() {
    var box = $("repList");
    var rows = repData.filter(function (r) { return repFilter === "open" ? r.status === "open" : true; });
    if (!rows.length) {
      box.innerHTML = '<div class="empty">' + (repFilter === "open" ? "미처리 신고가 없어요." : "신고가 없어요.") + "</div>";
      return;
    }
    box.innerHTML = "";
    rows.forEach(function (r) {
      var st = r.status;
      var stLabel = st === "open" ? "미처리" : st === "resolved" ? "처리완료" : st === "dismissed" ? "기각" : st;
      var stCls = st === "open" ? "open" : st === "dismissed" ? "dismissed" : "done";
      var el = document.createElement("div");
      el.className = "list-item";
      el.innerHTML =
        '<div class="grow">' +
          '<div class="actions" style="margin-bottom:4px">' +
            '<span class="badge ' + esc(r.target_type) + '">' + esc(TT[r.target_type] || r.target_type) + "</span>" +
            '<span class="badge ' + stCls + '">' + esc(stLabel) + "</span>" +
            '<span class="badge rep">' + esc(r.reason || "사유없음") + "</span>" +
          "</div>" +
          '<div class="msg">' + targetSummary(r) + "</div>" +
          '<div class="meta">신고자: ' + esc(r.reporter_name || "?") + " · " + fmtDate(r.created_at) + "</div>" +
        '</div><div class="actions"></div>';
      var acts = el.querySelector(".actions:last-child");
      if (st === "open") {
        acts.appendChild(mkBtn("해결", "sm", function () { setRep(r.id, "resolved"); }));
        acts.appendChild(mkBtn("기각", "ghost sm", function () { setRep(r.id, "dismissed"); }));
      } else {
        acts.appendChild(mkBtn("미처리로", "ghost sm", function () { setRep(r.id, "open"); }));
      }
      if (r.target && r.target_type === "comment") {
        acts.appendChild(mkBtn("댓글 삭제", "sm", async function () {
          if (!confirm("이 댓글을 삭제할까요?")) return;
          var rr = await rpc("admin_delete_comment", { p_id: r.target_id });
          if (rr.error) { alert("실패: " + rr.error.message); return; }
          loadReports();
        }));
      }
      if (r.target && r.target_type === "collection") {
        acts.appendChild(mkBtn("컬렉션 삭제", "sm", async function () {
          if (!confirm("신고된 컬렉션을 삭제할까요? 되돌릴 수 없어요.")) return;
          var rr = await rpc("admin_delete_collection", { p_id: r.target_id });
          if (rr.error) { alert("실패: " + rr.error.message); return; }
          loadReports(); loadCollections();
        }));
      }
      box.appendChild(el);
    });
  }

  async function setRep(id, status) {
    var r = await rpc("admin_set_report_status", { p_id: id, p_status: status });
    if (r.error) { alert("실패: " + r.error.message); return; }
    loadReports(); loadCollections();
  }

  // 시작: 저장된 비번이 있으면 검증 후 진입, 없으면 로그인.
  (async function () {
    if (!PW) { show("login"); return; }
    var res = await sb.rpc("admin_check", { p_pw: PW });
    if (res.data === true) enter(); else logout();
  })();
})();
</script>
</body>
</html>
